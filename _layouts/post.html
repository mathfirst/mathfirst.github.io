---
layout: default
blog: active
---

<div class="blog">
		<div class="blog single">
			<h1 class="title">{{ page.title }}</h1>
			
			<h2 class="date"><info datetime="{{ page.date }}">
				{{ page.date | date_to_string }} {% if page.author %} by {{ page.author }} {% endif %}
			</info></h2>
			

			<!-- Post content -->
			<div class="row">
				{{ content }}
				</div>


			<hr>

			<!-- Post comments -->
			<div class="notecomments">
				{% include disqus.html %}	 
			</div>
		</div><!-- / .blog .single -->
</div><!-- /.blog -->
